name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on version tags (e.g., v1.0.0, v1.2.0-beta)
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Self-Contained App
        shell: pwsh
        run: |
          ./scripts/publish-windows.ps1 -Configuration Release -Runtime win-x64

      - name: Build Inno Setup Installer
        shell: pwsh
        run: |
          # ISCC is preinstalled on GitHub Actions windows-latest runner at this path:
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          files: dist/WorkstationAuditorSetup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
